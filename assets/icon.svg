<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
    <defs>
        <!-- Background Gradient -->
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#212630" />
            <stop offset="100%" stop-color="#0E1116" />
        </linearGradient>
        
        <!-- Inner Border Gradient for 3D effect -->
        <linearGradient id="borderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15" />
            <stop offset="100%" stop-color="#000000" stop-opacity="0.6" />
        </linearGradient>

        <!-- Airflow Bar 3 (Back/Tallest) -->
        <linearGradient id="grad3" x1="180" y1="840" x2="652" y2="180" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#006AFF" />
            <stop offset="100%" stop-color="#00B8FF" />
        </linearGradient>

        <!-- Airflow Bar 2 (Middle) -->
        <linearGradient id="grad2" x1="210" y1="720" x2="512" y2="300" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#00B8FF" />
            <stop offset="100%" stop-color="#00E5FF" />
        </linearGradient>

        <!-- Airflow Bar 1 (Front/Shortest) -->
        <linearGradient id="grad1" x1="240" y1="600" x2="372" y2="420" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#00E5FF" />
            <stop offset="100%" stop-color="#00FFC2" />
        </linearGradient>

        <!-- Soft Drop Shadow for 3D Depth -->
        <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.5"/>
            <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
        </filter>

        <!-- Glow effect for the Status Indicator -->
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="16" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>

        <!-- Soft Ambient Glow behind the main graphic -->
        <filter id="ambientGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="60" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- App Icon Background Squircle -->
    <rect width="1024" height="1024" rx="225" fill="url(#bgGrad)" />
    
    <!-- Ambient glowing light in the center -->
    <circle cx="512" cy="512" r="300" fill="#00C2FF" opacity="0.08" filter="url(#ambientGlow)" />
    
    <!-- Dashboard Grid Background (Subtle) -->
    <g stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="3" stroke-dasharray="6 10">
        <line x1="140" y1="240" x2="884" y2="240" />
        <line x1="140" y1="400" x2="884" y2="400" />
        <line x1="140" y1="560" x2="884" y2="560" />
        <line x1="140" y1="720" x2="884" y2="720" />
        <line x1="140" y1="880" x2="884" y2="880" />
        
        <line x1="240" y1="140" x2="240" y2="884" />
        <line x1="400" y1="140" x2="400" y2="884" />
        <line x1="560" y1="140" x2="560" y2="884" />
        <line x1="720" y1="140" x2="720" y2="884" />
        <line x1="880" y1="140" x2="880" y2="884" />
    </g>

    <!-- Status Indicator Dot (Top Right) -->
    <g filter="url(#glow)">
        <circle cx="820" cy="200" r="16" fill="#00FFC2" />
    </g>
    <circle cx="820" cy="200" r="16" fill="#00FFC2" />
    <circle cx="820" cy="200" r="8" fill="#FFFFFF" opacity="0.6" />

    <!-- Wind Trails (Speed lines at the bottom left) -->
    <path d="M 60,840 L 80,840" fill="none" stroke="#006AFF" stroke-width="84" stroke-linecap="round" filter="url(#shadow)" opacity="0.7" />
    <path d="M 90,720 L 110,720" fill="none" stroke="#00B8FF" stroke-width="84" stroke-linecap="round" filter="url(#shadow)" opacity="0.7" />
    <path d="M 120,600 L 140,600" fill="none" stroke="#00E5FF" stroke-width="84" stroke-linecap="round" filter="url(#shadow)" opacity="0.7" />

    <!-- Main Wind Bar Chart (Drawn back-to-front) -->
    <!-- Background Bar (Tallest) -->
    <path d="M 180,840 Q 652,840 652,560 L 652,180" fill="none" stroke="url(#grad3)" stroke-width="84" stroke-linecap="round" filter="url(#shadow)" />
    
    <!-- Middle Bar -->
    <path d="M 210,720 Q 512,720 512,520 L 512,300" fill="none" stroke="url(#grad2)" stroke-width="84" stroke-linecap="round" filter="url(#shadow)" />
    
    <!-- Foreground Bar (Shortest) -->
    <path d="M 240,600 Q 372,600 372,480 L 372,420" fill="none" stroke="url(#grad1)" stroke-width="84" stroke-linecap="round" filter="url(#shadow)" />

    <!-- Inner stroke for the squircle to give a glossy macOS edge finish -->
    <rect width="1020" height="1020" x="2" y="2" rx="223" fill="none" stroke="url(#borderGrad)" stroke-width="4" />
</svg>