name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  macos-build-and-test:
    runs-on: macos-15
    defaults:
      run:
        working-directory: macos
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  website-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
