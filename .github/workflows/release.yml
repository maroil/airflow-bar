name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write
    defaults:
      run:
        working-directory: macos
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install build tools
        run: brew install create-dmg fileicon

      - name: Build DMG
        run: make dmg VERSION=${{ steps.version.outputs.VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: macos/AirflowBar-${{ steps.version.outputs.VERSION }}.dmg
          generate_release_notes: true

      - name: Update Homebrew Cask
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          DMG="AirflowBar-${{ steps.version.outputs.VERSION }}.dmg"
          DOWNLOAD_URL="https://github.com/maroil/airflow-bar/releases/download/v${{ steps.version.outputs.VERSION }}/${DMG}"
          curl -fSL -o "/tmp/${DMG}" "${DOWNLOAD_URL}"
          SHA256=$(shasum -a 256 "/tmp/${DMG}" | awk '{print $1}')
          cd ..
          git clone https://x-access-token:${GH_TOKEN}@github.com/maroil/homebrew-airflow-bar.git
          cd homebrew-airflow-bar
          sed -i '' \
            -e 's/version ".*"/version "${{ steps.version.outputs.VERSION }}"/' \
            -e "s/sha256 \".*\"/sha256 \"${SHA256}\"/" \
            Casks/airflow-bar.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/airflow-bar.rb
          git commit -m "Update cask to ${{ steps.version.outputs.VERSION }}"
          git push origin main
